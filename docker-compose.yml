services:
  backend:
    image: bennybar35/myshop-backend
    ports:
      - "80:3000"
    restart: always
    depends_on:
      - mongo
    environment:
      - MONGODB_URI=mongodb://mongo:27017/myshop
  mongo:
    image: mongo:latest
    expose:
      - "27017"
    restart: always
    volumes:
      - mongo_data:/data/db
volumes:
  mongo_data:
