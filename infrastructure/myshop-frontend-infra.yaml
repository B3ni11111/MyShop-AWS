AWSTemplateFormatVersion: "2010-09-09"
Description: S3 + CloudFront for MyShop React SPA frontend

Resources:

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: myshop-frontend-benny
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        IgnorePublicAcls: false
        BlockPublicPolicy: false
        RestrictPublicBuckets: false

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${FrontendBucket}/*"

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        HttpVersion: http2
        PriceClass: PriceClass_100
        Origins:
          - Id: S3WebsiteOrigin
            # S3 website endpoint — handles SPA routing via the error document
            DomainName: !Sub "${FrontendBucket}.s3-website-${AWS::Region}.amazonaws.com"
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: http-only
        DefaultCacheBehavior:
          TargetOriginId: S3WebsiteOrigin
          ViewerProtocolPolicy: redirect-to-https
          # AWS managed CachingOptimized policy
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          Compress: true
        # Return index.html for 403/404 so React Router handles all client-side routes
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0

Outputs:

  BucketName:
    Description: S3 bucket name
    Value: !Ref FrontendBucket

  DistributionId:
    Description: CloudFront distribution ID (needed for cache invalidations)
    Value: !Ref CloudFrontDistribution

  CloudFrontURL:
    Description: CloudFront HTTPS URL — use this in your browser
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"

  WebsiteURL:
    Description: S3 static website URL (HTTP only, bypasses CloudFront)
    Value: !GetAtt FrontendBucket.WebsiteURL
