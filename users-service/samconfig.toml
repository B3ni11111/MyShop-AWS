# SAM CLI configuration file
# More information: https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/serverless-sam-cli-config.html

version = 0.1

[default.deploy.parameters]
stack_name = "myshop-users-service"
resolve_s3 = true
s3_prefix = "myshop-users-service"
region = "us-east-1"
confirm_changeset = true
capabilities = "CAPABILITY_NAMED_IAM"
parameter_overrides = "Environment=\"dev\""

[default.build.parameters]
cached = true
parallel = true
